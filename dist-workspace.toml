[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.32.0"
ci = "github"
create-release = false
allow-dirty = ["ci"]
installers = []

targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]


[dist.dependencies.apt]
libfontconfig1-dev = "*"
