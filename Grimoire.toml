version = "1"

[sigil.build]
description = "Compile project"
run = "cargo build"

[sigil.test]
description = "Run tests"
run = "cargo test"

[sigil.test_lang]
language = "python"
run = "print('Hello World')"

[sigil.release]
description = "Create release artifacts"
language = "bash"
depends = ["build", "test"]
run = "cargo dist build"
